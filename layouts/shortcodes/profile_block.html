<article class="post-entry profile-block-card">
    <!-- 第一行：学校 (左) + 日期 (右) -->
    <div class="profile-row">
        <div class="profile-left">
            <h3 class="profile-title">
                {{ .Get "title" }} 
                {{ with .Get "status" }}<span class="profile-status-tag">{{ . }}</span>{{ end }}
            </h3>
        </div>
        <div class="profile-right profile-date">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            {{ .Get "date" }}
        </div>
    </div>

    <!-- 第二行：学位/职位 (左) + 地点 (右) -->
    <div class="profile-row sub-row">
        <div class="profile-left">
            <div class="profile-degree">{{ .Get "sub" }}</div>
        </div>
        <div class="profile-right profile-location">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            {{ .Get "location" }}
        </div>
    </div>
    
    <!-- 第三行：描述内容（导师等） -->
    {{ if .Inner }}
    <div class="profile-body">
        <div class="profile-desc">{{ .Inner | markdownify }}</div>
    </div>
    {{ end }}
</article>
